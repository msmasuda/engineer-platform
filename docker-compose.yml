services:
  postgres:
    image: postgres:16-alpine
    container_name: engineer-platform-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change_me_to_a_password  # ※ローカルLAN内用のパスワードを設定してください
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: engineer-platform-redis
    restart: unless-stopped
    command: redis-server --requirepass change_me_to_a_redis_password  # ※ローカルLAN用の接続パスワードを設定してください
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  srh:
    image: hiett/serverless-redis-http:latest
    container_name: engineer-platform-srh
    restart: unless-stopped
    ports:
      - "8079:80"
    environment:
      SRH_MODE: "env"
      SRH_CONNECTION_STRING: "redis://default:change_me_to_a_redis_password@redis:6379"
      SRH_TOKEN: "mock_token"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
